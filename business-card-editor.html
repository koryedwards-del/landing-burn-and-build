<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burn &amp; Build — Card Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/business-card.css" />
  <style>
    body {
      min-height: 100vh;
      background: #141414;
      color: #D4D4D4;
      font-family: 'Barlow', sans-serif;
      padding: 24px 20px 64px;
    }

    .editor-bar {
      max-width: 640px;
      margin: 0 auto 24px;
      text-align: center;
    }

    .editor-bar h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #8A8A8A;
      margin-bottom: 8px;
    }

    .editor-bar p {
      font-size: 0.9rem;
      color: #888;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .editor-actions button,
    .editor-actions a {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 16px;
      border: 1px solid #2A2A2A;
      background: #1A1A1A;
      color: #FFCC00;
      text-decoration: none;
      cursor: pointer;
    }

    .editor-actions button:hover,
    .editor-actions a:hover { border-color: #FFCC00; }

    .saved-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1A1A1A;
      border: 1px solid #FFCC00;
      color: #FFCC00;
      font-size: 0.8rem;
      padding: 8px 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .saved-toast.show { opacity: 1; }

    @media print {
      body { background: #fff; padding: 0.5in; }
      .editor-bar, .saved-toast { display: none; }
      .biz-card { box-shadow: none; border: 1px dashed #ccc; }
    }
  </style>
</head>
<body>

  <header class="editor-bar">
    <h1>Card Editor</h1>
    <p>Click any text to edit. Saves in this browser automatically.</p>
    <div class="editor-actions">
      <button type="button" onclick="window.print()">Print card</button>
      <button type="button" id="btn-reset">Reset text</button>
      <a href="business-card-mockup.html">View HTML</a>
    </div>
  </header>

  <div class="card-viewport">
    <div class="card-stage">
      <div class="biz-card card-front">
        <p class="card-eyebrow" contenteditable="true" data-field="eyebrow">The Premier Body Recomp Diet</p>
        <img class="card-logo" src="img/brand/bblogo.png" alt="Burn &amp; Build" />
        <p class="card-tagline">
          <span class="accent" contenteditable="true" data-field="tagline1">Lose Fat.</span><br />
          <span contenteditable="true" data-field="tagline2">Keep Your Muscle.</span>
        </p>
        <span class="card-since" contenteditable="true" data-field="since">Since 1982</span>
      </div>

      <div class="biz-card card-back">
        <div class="qr-block">
          <img src="img/brand/qr-burnandbuilddiet.png" alt="QR code" />
        </div>
        <div class="back-copy">
          <img class="back-logo" src="img/brand/bblogo.png" alt="" aria-hidden="true" />
          <div class="back-url" contenteditable="true" data-field="url">burnandbuilddiet.com</div>
          <div class="back-cta" contenteditable="true" data-field="cta">Create Your Diet</div>
          <div class="back-price" contenteditable="true" data-field="price">$149 • One-Time Purchase</div>
          <div class="back-divider"></div>
          <div class="back-name" contenteditable="true" data-field="name">KORY EDWARDS</div>
          <div class="back-email" contenteditable="true" data-field="email">kory@burnandbuilddiet.com</div>
        </div>
      </div>
    </div>
  </div>

  <div class="saved-toast" id="toast">Saved</div>

  <script>
    (function () {
      var STORAGE_KEY = 'burnandbuild-card-editor-v1';
      var DEFAULTS = {
        eyebrow: 'The Premier Body Recomp Diet',
        tagline1: 'Lose Fat.',
        tagline2: 'Keep Your Muscle.',
        since: 'Since 1982',
        url: 'burnandbuilddiet.com',
        cta: 'Create Your Diet',
        price: '$149 • One-Time Purchase',
        name: 'KORY EDWARDS',
        email: 'kory@burnandbuilddiet.com'
      };

      var toast = document.getElementById('toast');
      var toastTimer;

      function showToast(msg) {
        toast.textContent = msg || 'Saved';
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () { toast.classList.remove('show'); }, 1200);
      }

      function readFields() {
        var data = {};
        document.querySelectorAll('[data-field]').forEach(function (el) {
          data[el.getAttribute('data-field')] = el.textContent.trim();
        });
        return data;
      }

      function writeFields(data) {
        document.querySelectorAll('[data-field]').forEach(function (el) {
          var key = el.getAttribute('data-field');
          if (data[key] != null) el.textContent = data[key];
        });
      }

      function save() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(readFields()));
          showToast('Saved');
        } catch (e) {}
      }

      function load() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (raw) writeFields(JSON.parse(raw));
        } catch (e) {}
      }

      document.querySelectorAll('[contenteditable="true"]').forEach(function (el) {
        el.addEventListener('blur', save);
        el.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
        });
      });

      document.getElementById('btn-reset').addEventListener('click', function () {
        if (confirm('Reset all card text to defaults?')) {
          writeFields(DEFAULTS);
          save();
        }
      });

      load();
    })();
  </script>
</body>
</html>
