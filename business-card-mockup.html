<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burn &amp; Build — Business Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #141414;
      color: var(--gray-light);
      font-family: 'Barlow', sans-serif;
      padding: 48px 24px 80px;
    }

    .page-header {
      max-width: 560px;
      margin: 0 auto 40px;
      text-align: center;
    }

    .page-header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray-heading);
      margin-bottom: 12px;
    }

    .print-note {
      font-size: 0.8rem;
      color: #666;
    }

    .print-note a { color: var(--yellow); }

    .cards-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      max-width: 560px;
      margin: 0 auto;
    }

    /* Standard US business card: 3.5" × 2" */
    .biz-card {
      width: 3.5in;
      height: 2in;
      background: var(--black);
      border: 1px solid #222;
      box-shadow:
        0 24px 48px rgba(0, 0, 0, 0.55),
        0 4px 12px rgba(0, 0, 0, 0.35);
      position: relative;
      overflow: hidden;
    }

    /* ── FRONT ── */
    .card-front {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0.14in 0.2in 0.18in;
      text-align: center;
    }

    .card-front::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--yellow);
    }

    .card-eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.46rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: 0.05in;
    }

    .card-logo {
      width: 1.22in;
      height: 1.22in;
      object-fit: contain;
      display: block;
      margin-bottom: 0.04in;
    }

    .card-tagline {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 0.58rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--gray-light);
      line-height: 1.3;
    }

    .card-tagline .accent { color: var(--yellow); }

    .card-since {
      position: absolute;
      bottom: 0.12in;
      right: 0.18in;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.42rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gray-muted);
    }

    /* ── BACK ── */
    .card-back {
      display: grid;
      grid-template-columns: 1.05in 1fr;
      gap: 0.16in;
      padding: 0.2in 0.22in 0.18in;
      align-items: center;
    }

    .card-back::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--yellow);
    }

    .qr-block img {
      width: 1.02in;
      height: 1.02in;
      display: block;
      background: #fff;
      padding: 4px;
    }

    .back-copy {
      display: flex;
      flex-direction: column;
      gap: 0.05in;
      min-width: 0;
    }

    .back-logo {
      width: 0.48in;
      height: 0.48in;
      object-fit: contain;
      display: block;
    }

    .back-url {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 0.68rem;
      letter-spacing: 0.03em;
      color: var(--yellow);
      text-transform: lowercase;
    }

    .back-cta {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gray-light);
      line-height: 1.15;
    }

    .back-price {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.44rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray-muted);
    }

    .back-divider {
      width: 100%;
      height: 1px;
      background: var(--gray-mid);
      margin: 0.03in 0 0.02in;
    }

    .back-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 0.54rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-light);
    }

    .back-email {
      font-family: 'Barlow', sans-serif;
      font-size: 0.44rem;
      color: var(--gray-muted);
      letter-spacing: 0.02em;
    }

    @media print {
      body { background: #fff; padding: 0.5in; }
      .page-header { display: none; }
      .cards-stage { gap: 0.25in; }
      .biz-card {
        box-shadow: none;
        border: 1px dashed #ccc;
        break-inside: avoid;
      }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <h1>Business Card — 3.5″ × 2″</h1>
    <p class="print-note">Print at 100% scale — no “fit to page.” <a href="#" onclick="window.print(); return false;">Print</a></p>
  </header>

  <div class="cards-stage">
    <div class="biz-card card-front">
      <p class="card-eyebrow">The Premier Body Recomp Diet</p>
      <img class="card-logo" src="img/brand/bblogo.png" alt="Burn &amp; Build" width="384" height="384" />
      <p class="card-tagline">
        <span class="accent">Lose Fat.</span><br />
        Keep Your Muscle.
      </p>
      <span class="card-since">Since 1982</span>
    </div>

    <div class="biz-card card-back">
      <div class="qr-block">
        <img src="img/brand/qr-burnandbuilddiet.png" width="1000" height="1000" alt="QR code — burnandbuilddiet.com" />
      </div>
      <div class="back-copy">
        <img class="back-logo" src="img/brand/bblogo.png" alt="" width="156" height="156" aria-hidden="true" />
        <div class="back-url">burnandbuilddiet.com</div>
        <div class="back-cta">Create Your Diet</div>
        <div class="back-price">$149 • One-Time Purchase</div>
        <div class="back-divider"></div>
        <div class="back-name">KORY EDWARDS</div>
        <div class="back-email">kory@burnandbuilddiet.com</div>
      </div>
    </div>
  </div>

</body>
</html>
