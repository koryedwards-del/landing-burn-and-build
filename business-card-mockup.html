<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burn &amp; Build — Business Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/business-card.css" />
  <style>
    body {
      min-height: 100vh;
      background: #141414;
      color: #D4D4D4;
      font-family: 'Barlow', sans-serif;
      padding: 24px 20px 64px;
    }

    .page-bar {
      max-width: 640px;
      margin: 0 auto 28px;
      text-align: center;
      font-size: 0.85rem;
      color: #888;
    }

    .page-bar a { color: #FFCC00; }

    @media print {
      body { background: #fff; padding: 0.5in; }
      .page-bar { display: none; }
      .biz-card { box-shadow: none; border: 1px dashed #ccc; }
    }
  </style>
</head>
<body>

  <p class="page-bar">
    <a href="business-card-editor.html">Edit visually</a> ·
    <a href="#" onclick="window.print(); return false;">Print</a> (100% scale, no fit to page)
  </p>

  <div class="card-viewport">
    <div class="card-stage">
      <div class="biz-card card-front">
        <p class="card-eyebrow">The Premier Body Recomp Diet</p>
        <img class="card-logo" src="img/brand/bblogo.png" alt="Burn &amp; Build" />
        <p class="card-tagline">
          <span class="accent">Lose Fat.</span><br />
          Keep Your Muscle.
        </p>
        <span class="card-since">Since 1982</span>
      </div>

      <div class="biz-card card-back">
        <div class="qr-block">
          <img src="img/brand/qr-burnandbuilddiet.png" alt="QR code — burnandbuilddiet.com" />
        </div>
        <div class="back-copy">
          <img class="back-logo" src="img/brand/bblogo.png" alt="" aria-hidden="true" />
          <div class="back-url">burnandbuilddiet.com</div>
          <div class="back-cta">Create Your Diet</div>
          <div class="back-price">$149 • One-Time Purchase</div>
          <div class="back-divider"></div>
          <div class="back-name">KORY EDWARDS</div>
          <div class="back-email">kory@burnandbuilddiet.com</div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
